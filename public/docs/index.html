        /* ----- 品牌色 ----- */
        :root {
            --red: #ec4141;
            --red-dark: #b83030;
            --red-light: #fce8e8;
            --red-glow: rgba(236, 65, 65, 0.3);

        * {

        }
        body {
            background: var(--bg-body);
            color: var(--text-dark);

           ================================================================ */

            padding: 5px 12px !important;

           3. 标题 — 红色边框 / 下划线

            z-index: 999 !important;

            height: 52px !important;
            border-radius: 50% !important;

            color: #fff !important;
            font-size: 24px !important;
            cursor: pointer !important;
            display: flex !important;
            align-items: center !important;
            justify-content: center !important;
            box-shadow: 0 4px 20px var(--red-glow) !important;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1) !important;
            outline: none !important;
            padding: 0 !important;
            user-select: none !important;
        }

            transform: scale(1.12) rotate(8deg) !important;
            box-shadow: 0 6px 32px var(--red-glow) !important;
        }

            color: var(--text-dark) !important;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08) !important;

<body>
    <div id="app"></div>
    <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">🌙</button>

    <!-- ===== 主题切换 ===== -->
    <script>
        (function() {
            var STORAGE_KEY = 'docsify-theme';
            var link = document.getElementById('theme-css');
            var btn = document.getElementById('themeToggle');
            var LIGHT_URL = '//unpkg.com/docsify/lib/themes/vue.css';
            var DARK_URL = '//unpkg.com/docsify/lib/themes/dark.css';

            function setTheme(theme) {
                link.href = theme === 'dark' ? DARK_URL : LIGHT_URL;
                btn.textContent = theme === 'dark' ? '☀️' : '🌙';
                btn.className = 'theme-toggle' + (theme === 'dark' ? '' : ' light');
                document.body.classList.toggle('dark', theme === 'dark');
                localStorage.setItem(STORAGE_KEY, theme);
            }

            function toggleTheme() {
                var isDark = link.href.includes('dark');
                setTheme(isDark ? 'light' : 'dark');
            }

            var saved = localStorage.getItem(STORAGE_KEY);
            if (saved) {
                setTheme(saved);
            } else if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
                setTheme('dark');
            }

            btn.addEventListener('click', toggleTheme);

            try {
                window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', function(e) {
                    if (!localStorage.getItem(STORAGE_KEY)) {
                        setTheme(e.matches ? 'dark' : 'light');
                    }
                });
            } catch (e) {}
        })();
    </script>
