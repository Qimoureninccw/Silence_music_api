<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="keywords" content="网易云音乐,网易云音乐 api,网易云音乐 nodejs" />
    <meta name="description" content="网易云音乐 NodeJS API Enhanced" />
    <title>网易云音乐 API Enhanced</title>
    <link rel="icon" href="netease.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />

    <link rel="stylesheet" href="//unpkg.com/docsify/lib/themes/vue.css" id="theme-css" />

    <style>
        /* ===== 完全覆盖默认绿色，改为网易红 ===== */
        :root {
            --red: #ec4141;
            --red-dark: #b83030;
            --red-light: #fce8e8;
            --red-glow: rgba(236, 65, 65, 0.3);
            --bg-body: #f0f2f6;
            --card-bg: rgba(255, 255, 255, 0.82);
            --text-color: #1a1a2e;
            --text-muted: #5a5a7a;
            --border-color: rgba(0, 0, 0, 0.06);
            --shadow: 0 8px 32px rgba(0, 0, 0, 0.06);
            --radius: 16px;
            --radius-sm: 8px;
        }

        body {
            background: var(--bg-body);
            color: var(--text-color);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'PingFang SC', 'Microsoft YaHei', sans-serif;
        }

        /* ----- 侧边栏 ----- */
        .sidebar {
            background: rgba(255, 255, 255, 0.88) !important;
            backdrop-filter: blur(16px) !important;
            -webkit-backdrop-filter: blur(16px) !important;
            border-right: 1px solid var(--border-color) !important;
            box-shadow: 2px 0 24px rgba(0, 0, 0, 0.04) !important;
            padding-top: 20px !important;
        }
        .app-name-link {
            color: var(--red) !important;
            font-weight: 700 !important;
        }
        .sidebar-nav ul li a {
            color: var(--text-color) !important;
            font-weight: 500 !important;
            border-radius: 6px !important;
            padding: 5px 12px !important;
            margin: 2px 0 !important;
            transition: all 0.2s !important;
            border-left: 3px solid transparent !important;
        }
        .sidebar-nav ul li a:hover {
            background: var(--red-light) !important;
            color: var(--red) !important;
        }
        .sidebar-nav ul li a.active {
            background: var(--red) !important;
            color: #fff !important;
            border-left-color: var(--red-dark) !important;
            box-shadow: 0 2px 12px var(--red-glow) !important;
        }

        /* ----- 主内容 ----- */
        .content {
            padding-top: 30px !important;
            background: transparent !important;
        }
        .markdown-section {
            max-width: 900px !important;
            margin: 0 auto !important;
            padding: 24px 32px 60px !important;
            background: var(--card-bg) !important;
            backdrop-filter: blur(6px) !important;
            -webkit-backdrop-filter: blur(6px) !important;
            border-radius: var(--radius) !important;
            box-shadow: var(--shadow) !important;
            border: 1px solid var(--border-color) !important;
        }

        /* ----- 标题 ----- */
        .markdown-section h1 {
            font-size: 2rem !important;
            font-weight: 700 !important;
            border-bottom: 3px solid var(--red) !important;
            padding-bottom: 12px !important;
            color: var(--text-color) !important;
        }
        .markdown-section h2 {
            font-weight: 600 !important;
            border-left: 4px solid var(--red) !important;
            padding-left: 16px !important;
            margin-top: 40px !important;
            color: var(--text-color) !important;
        }
        .markdown-section h3, .markdown-section h4 {
            font-weight: 600 !important;
            color: var(--text-color) !important;
        }

        /* ----- 链接 ----- */
        a, .markdown-section a {
            color: var(--red) !important;
            text-decoration: none !important;
            border-bottom: 1.5px solid transparent !important;
            transition: border-color 0.2s !important;
        }
        a:hover, .markdown-section a:hover {
            border-bottom-color: var(--red) !important;
            color: var(--red-dark) !important;
        }

        /* ----- 代码 ----- */
        .markdown-section code {
            color: var(--red-dark) !important;
            background: var(--red-light) !important;
            padding: 2px 8px !important;
            border-radius: 4px !important;
        }
        .markdown-section pre {
            background: #1a1a2e !important;
            border-radius: var(--radius-sm) !important;
            padding: 16px 20px !important;
            border: 1px solid rgba(255,255,255,0.06) !important;
        }
        .markdown-section pre code {
            background: transparent !important;
            color: #e0e0e8 !important;
            padding: 0 !important;
        }

        /* ----- 表格 ----- */
        .markdown-section table thead {
            background: var(--red) !important;
            color: #fff !important;
        }
        .markdown-section table tbody tr:nth-child(even) {
            background: rgba(0,0,0,0.02) !important;
        }

        /* ----- 引用块 ----- */
        .markdown-section blockquote {
            border-left: 4px solid var(--red) !important;
            background: rgba(236,65,65,0.05) !important;
            padding: 12px 20px !important;
            border-radius: 0 var(--radius-sm) var(--radius-sm) 0 !important;
            color: var(--text-muted) !important;
        }

        /* ----- 顶部导航 ----- */
        .app-nav {
            background: rgba(255,255,255,0.6) !important;
            backdrop-filter: blur(12px) !important;
            -webkit-backdrop-filter: blur(12px) !important;
            border-bottom: 1px solid var(--border-color) !important;
            padding: 10px 20px !important;
        }
        .app-nav a {
            color: var(--text-color) !important;
            font-weight: 500 !important;
        }
        .app-nav a:hover {
            color: var(--red) !important;
        }
        .app-nav a::before {
            background: var(--red) !important;
        }

        /* ----- 分页 ----- */
        .docsify-pagination-container {
            border-top: 1px solid var(--border-color) !important;
            padding-top: 20px !important;
            margin-top: 32px !important;
        }
        .pagination-item:hover {
            background: var(--red-light) !important;
        }

        /* ----- 搜索框 ----- */
        .search .input-wrap input:focus {
            border-color: var(--red) !important;
            box-shadow: 0 0 0 2px var(--red-glow) !important;
        }

        /* ----- 深色模式 ----- */
        body.dark {
            --bg-body: #12121e;
            --card-bg: rgba(28,28,44,0.82);
            --text-color: #e8e8f0;
            --text-muted: #8888aa;
            --border-color: rgba(255,255,255,0.06);
            --shadow: 0 8px 32px rgba(0,0,0,0.3);
        }
        body.dark .sidebar {
            background: rgba(18,18,30,0.92) !important;
            border-right-color: var(--border-color) !important;
        }
        body.dark .sidebar-nav ul li a {
            color: #c8c8d8 !important;
        }
        body.dark .sidebar-nav ul li a:hover {
            background: rgba(236,65,65,0.15) !important;
            color: var(--red) !important;
        }
        body.dark .sidebar-nav ul li a.active {
            background: var(--red) !important;
            color: #fff !important;
        }
        body.dark .markdown-section code {
            background: rgba(236,65,65,0.15) !important;
            color: #f0a0a0 !important;
        }
        body.dark .markdown-section pre {
            background: #0a0a14 !important;
        }
        body.dark .markdown-section blockquote {
            background: rgba(236,65,65,0.08) !important;
        }
        body.dark .markdown-section table tbody tr:nth-child(even) {
            background: rgba(255,255,255,0.02) !important;
        }
        body.dark .app-nav {
            background: rgba(18,18,30,0.7) !important;
            border-bottom-color: var(--border-color) !important;
        }
        body.dark .app-nav a {
            color: #c8c8d8 !important;
        }
        body.dark .app-nav a:hover {
            color: var(--red) !important;
        }

        /* ----- 移动端 ----- */
        @media (max-width: 768px) {
            .markdown-section {
                padding: 16px 18px 40px !important;
                border-radius: 12px !important;
                margin: 0 10px !important;
            }
            .sidebar {
                transform: translateX(-100%);
                transition: transform 0.3s ease;
                width: 280px;
            }
            .sidebar.open {
                transform: translateX(0);
            }
            .sidebar-overlay {
                display: none;
                position: fixed;
                inset: 0;
                background: rgba(0,0,0,0.3);
                z-index: 99;
                backdrop-filter: blur(2px);
            }
            .sidebar-overlay.open {
                display: block;
            }
            .sidebar-toggle {
                display: flex;
                align-items: center;
                justify-content: center;
                position: fixed;
                top: 14px;
                left: 14px;
                z-index: 101;
                background: var(--red);
                color: #fff;
                border: none;
                border-radius: 8px;
                width: 42px;
                height: 42px;
                font-size: 22px;
                cursor: pointer;
                box-shadow: 0 2px 12px var(--red-glow);
            }
            .content {
                padding-top: 16px !important;
            }
        }
        @media (min-width: 769px) {
            .sidebar-toggle, .sidebar-overlay {
                display: none !important;
            }
        }

        /* ----- 主题切换按钮 ----- */
        .theme-toggle {
            position: fixed;
            bottom: 24px;
            right: 24px;
            z-index: 200;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            border: none;
            background: linear-gradient(135deg, var(--red), var(--red-dark));
            color: #fff;
            font-size: 22px;
            cursor: pointer;
            box-shadow: 0 4px 20px var(--red-glow);
            transition: all 0.3s cubic-bezier(0.4,0,0.2,1);
            display: flex;
            align-items: center;
            justify-content: center;
            outline: none;
            user-select: none;
        }
        .theme-toggle:hover {
            transform: scale(1.1) rotate(6deg);
            box-shadow: 0 6px 32px var(--red-glow);
        }
        .theme-toggle:active {
            transform: scale(0.92);
        }
        .theme-toggle.light-mode {
            background: rgba(255,255,255,0.9);
            color: var(--text-color);
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        }

        /* ----- 滚动条 ----- */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: var(--bg-body); }
        ::-webkit-scrollbar-thumb { background: var(--red); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--red-dark); }
    </style>
</head>
<body>

    <div id="app"></div>

    <!-- 移动端侧边栏 -->
    <button class="sidebar-toggle" id="sidebarToggle" aria-label="切换侧边栏">☰</button>
    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <!-- 主题切换 -->
    <button class="theme-toggle" id="themeToggle" aria-label="切换主题">🌙</button>

    <script>
        window.$docsify = {
            name: '网易云音乐 API Enhanced',
            repo: 'https://github.com/neteasecloudmusicapienhanced/api-enhanced',
            coverpage: false,          // 关掉封面页，直接显示文档
            homepage: 'home.md',
            loadSidebar: false,
            subMaxLevel: 4,
            auto2top: true,
            nameLink: '/',
            search: {
                maxAge: 86400000,
                paths: 'auto',
                placeholder: '搜索文档...',
                noData: '没有找到相关内容'
            },
            copyCode: {
                buttonText: '复制',
                successText: '已复制 ✓'
            },
            nav: [
                { title: '首页', path: '/' },
                { title: '文档', path: '/home' },
                { title: 'GitHub', path: 'https://github.com/neteasecloudmusicapienhanced/api-enhanced' }
            ]
        };
    </script>

    <script src="https://unpkg.com/docsify@4.11.3/lib/docsify.min.js"></script>
    <script src="https://unpkg.com/docsify-plugin-search@2.0.0/dist/search.min.js"></script>
    <script src="https://unpkg.com/docsify-copy-code@2.1.1/dist/docsify-copy-code.min.js"></script>
    <script src="https://unpkg.com/docsify-plugin-flexible-alerts@1.1.0/docsify-plugin-flexible-alerts.min.js"></script>

    <!-- 主题切换 -->
    <script>
        (function() {
            var STORAGE_KEY = 'docsify-theme';
            var btn = document.getElementById('themeToggle');

            function setTheme(theme) {
                var isDark = (theme === 'dark');
                document.body.classList.toggle('dark', isDark);
                btn.textContent = isDark ? '☀️' : '🌙';
                btn.className = 'theme-toggle' + (isDark ? '' : ' light-mode');
                try { localStorage.setItem(STORAGE_KEY, theme); } catch(e) {}
            }

            function toggleTheme() {
                var isDark = document.body.classList.contains('dark');
                setTheme(isDark ? 'light' : 'dark');
            }

            var saved = localStorage.getItem(STORAGE_KEY);
            if (saved) {
                setTheme(saved);
            } else if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
                setTheme('dark');
            }

            btn.addEventListener('click', toggleTheme);

            try {
                window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', function(e) {
                    if (!localStorage.getItem(STORAGE_KEY)) {
                        setTheme(e.matches ? 'dark' : 'light');
                    }
                });
            } catch(e) {}
        })();
    </script>

    <!-- 移动端侧边栏控制 -->
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            var toggleBtn = document.getElementById('sidebarToggle');
            var overlay = document.getElementById('sidebarOverlay');

            function openSidebar() {
                document.querySelector('.sidebar').classList.add('open');
                overlay.classList.add('open');
                document.body.style.overflow = 'hidden';
            }

            function closeSidebar() {
                document.querySelector('.sidebar').classList.remove('open');
                overlay.classList.remove('open');
                document.body.style.overflow = '';
            }

            toggleBtn.addEventListener('click', function(e) {
                e.stopPropagation();
                var sidebar = document.querySelector('.sidebar');
                sidebar.classList.contains('open') ? closeSidebar() : openSidebar();
            });

            overlay.addEventListener('click', closeSidebar);

            document.querySelectorAll('.sidebar-nav a').forEach(function(link) {
                link.addEventListener('click', function() {
                    if (window.innerWidth <= 768) closeSidebar();
                });
            });

            window.addEventListener('resize', function() {
                if (window.innerWidth > 768) closeSidebar();
            });
        });
    </script>

    <!-- PWA -->
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js').catch(function() {});
        }
    </script>

    <!-- GA -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-BPRGR23JEG"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){ dataLayer.push(arguments); }
        gtag('js', new Date());
        gtag('config', 'G-BPRGR23JEG');
    </script>
</body>
</html>
