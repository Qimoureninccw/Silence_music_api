<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>网易云音乐 API Enhanced · 文档</title>
    <link rel="icon" href="netease.png" />
    <link rel="stylesheet" href="//unpkg.com/docsify/lib/themes/vue.css" />

    <style>
        :root {
            --red: #ec4141;
            --red-dark: #c23333;
            --red-light: #fce8e8;
            --red-glow: rgba(236, 65, 65, 0.25);
            --bg-body: #f4f6fa;
            --card-bg: #ffffff;
            --text-color: #1a1a2e;
            --text-muted: #5a5a7a;
            --border-color: #e8e8ee;
            --shadow: 0 2px 16px rgba(0, 0, 0, 0.06);
            --radius: 16px;
            --radius-sm: 8px;
        }

        body {
            background-image: url('/public/bg.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-repeat: no-repeat;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'PingFang SC', 'Microsoft YaHei', sans-serif;
            color: var(--text-color);
            line-height: 1.7;
        }

        .content {
            padding-top: 30px !important;
            background: transparent !important;
        }

        .markdown-section {
            max-width: 920px !important;
            margin: 0 auto !important;
            padding: 32px 40px 50px !important;
            background: var(--card-bg) !important;
            border-radius: var(--radius) !important;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.12) !important;
            border: 1px solid var(--border-color) !important;
        }

        .sidebar {
            background: rgba(255, 255, 255, 0.88) !important;
            backdrop-filter: none !important;
            -webkit-backdrop-filter: none !important;
            border-right: 1px solid var(--border-color) !important;
            box-shadow: 2px 0 20px rgba(0, 0, 0, 0.04) !important;
        }

        .app-name-link {
            color: var(--red) !important;
            font-weight: 700 !important;
        }

        .sidebar-nav ul li a {
            color: var(--text-color) !important;
            font-weight: 500 !important;
            border-radius: 6px !important;
            padding: 5px 12px !important;
            margin: 2px 0 !important;
            transition: all 0.2s !important;
            border-left: 3px solid transparent !important;
        }

        .sidebar-nav ul li a:hover {
            background: var(--red-light) !important;
            color: var(--red) !important;
        }

        .sidebar-nav ul li a.active {
            background: var(--red) !important;
            color: #fff !important;
            border-left-color: var(--red-dark) !important;
            box-shadow: 0 2px 12px var(--red-glow) !important;
        }

        .markdown-section h1 {
            font-size: 2rem !important;
            font-weight: 700 !important;
            border-bottom: 3px solid var(--red) !important;
            padding-bottom: 12px !important;
            color: var(--text-color) !important;
        }

        .markdown-section h2 {
            font-weight: 600 !important;
            border-left: 4px solid var(--red) !important;
            padding-left: 16px !important;
            margin-top: 40px !important;
            color: var(--text-color) !important;
        }

        .markdown-section h3,
        .markdown-section h4 {
            font-weight: 600 !important;
            color: var(--text-color) !important;
        }

        a,
        .markdown-section a {
            color: var(--red) !important;
            text-decoration: none !important;
            border-bottom: 1.5px solid transparent !important;
            transition: border-color 0.2s !important;
        }

        a:hover,
        .markdown-section a:hover {
            border-bottom-color: var(--red) !important;
            color: var(--red-dark) !important;
        }

        .markdown-section code {
            color: var(--red-dark) !important;
            background: var(--red-light) !important;
            padding: 2px 8px !important;
            border-radius: 4px !important;
            font-size: 0.88em !important;
        }

        .markdown-section pre {
            background: #1a1a2e !important;
            border-radius: var(--radius-sm) !important;
            padding: 16px 20px !important;
            border: 1px solid rgba(255, 255, 255, 0.06) !important;
        }

        .markdown-section pre code {
            background: transparent !important;
            color: #e0e0e8 !important;
            padding: 0 !important;
        }

        .markdown-section table thead {
            background: var(--red) !important;
            color: #fff !important;
        }

        .markdown-section table th,
        .markdown-section table td {
            border-color: var(--border-color) !important;
        }

        .markdown-section table tbody tr:nth-child(even) {
            background: rgba(0, 0, 0, 0.02) !important;
        }

        .markdown-section blockquote {
            border-left: 4px solid var(--red) !important;
            background: rgba(236, 65, 65, 0.05) !important;
            padding: 12px 20px !important;
            border-radius: 0 var(--radius-sm) var(--radius-sm) 0 !important;
            color: var(--text-muted) !important;
        }

        .app-nav {
            background: rgba(255, 255, 255, 0.7) !important;
            backdrop-filter: none !important;
            -webkit-backdrop-filter: none !important;
            border-bottom: 1px solid var(--border-color) !important;
            padding: 10px 20px !important;
        }

        .app-nav a {
            color: var(--text-color) !important;
            font-weight: 500 !important;
        }

        .app-nav a:hover {
            color: var(--red) !important;
        }

        .app-nav a::before {
            background: var(--red) !important;
        }

        .docsify-pagination-container {
            border-top: 1px solid var(--border-color) !important;
            padding-top: 20px !important;
            margin-top: 32px !important;
        }

        .pagination-item:hover {
            background: var(--red-light) !important;
        }

        .search .input-wrap input:focus {
            border-color: var(--red) !important;
            box-shadow: 0 0 0 2px var(--red-glow) !important;
        }

        .sidebar-toggle {
            background: var(--red) !important;
            color: #fff !important;
            box-shadow: 0 2px 12px var(--red-glow) !important;
            border-radius: 8px !important;
        }

        ::-webkit-scrollbar {
            width: 5px;
            height: 5px;
        }
        ::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.04);
        }
        ::-webkit-scrollbar-thumb {
            background: var(--red);
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: var(--red-dark);
        }

        body.dark {
            --card-bg: #1c1c2e;
            --text-color: #e8e8f0;
            --text-muted: #8888aa;
            --border-color: rgba(255, 255, 255, 0.06);
            --shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        body.dark .sidebar {
            background: rgba(18, 18, 30, 0.92) !important;
            border-right-color: var(--border-color) !important;
        }

        body.dark .sidebar-nav ul li a {
            color: #c8c8d8 !important;
        }

        body.dark .sidebar-nav ul li a:hover {
            background: rgba(236, 65, 65, 0.15) !important;
            color: var(--red) !important;
        }

        body.dark .sidebar-nav ul li a.active {
            background: var(--red) !important;
            color: #fff !important;
        }

        body.dark .markdown-section code {
            background: rgba(236, 65, 65, 0.15) !important;
            color: #f0a0a0 !important;
        }

        body.dark .markdown-section pre {
            background: #0a0a14 !important;
        }

        body.dark .markdown-section blockquote {
            background: rgba(236, 65, 65, 0.08) !important;
        }

        body.dark .markdown-section table tbody tr:nth-child(even) {
            background: rgba(255, 255, 255, 0.02) !important;
        }

        body.dark .app-nav {
            background: rgba(18, 18, 30, 0.7) !important;
            border-bottom-color: var(--border-color) !important;
        }

        body.dark .app-nav a {
            color: #c8c8d8 !important;
        }

        body.dark .app-nav a:hover {
            color: var(--red) !important;
        }

        @media (max-width: 768px) {
            .markdown-section {
                padding: 18px 16px 32px !important;
                border-radius: 12px !important;
                margin: 0 10px !important;
            }
            .content {
                padding-top: 16px !important;
            }
        }

        .theme-toggle {
            position: fixed;
            bottom: 24px;
            right: 24px;
            z-index: 200;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            border: none;
            background: var(--red);
            color: #fff;
            font-size: 20px;
            cursor: pointer;
            box-shadow: 0 4px 20px var(--red-glow);
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            outline: none;
        }

        .theme-toggle:hover {
            transform: scale(1.08) rotate(6deg);
            box-shadow: 0 6px 28px var(--red-glow);
        }

        .theme-toggle.light-mode {
            background: rgba(255, 255, 255, 0.92);
            color: var(--text-color);
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.08);
        }
    </style>
</head>
<body>

    <div id="app"></div>
    <button class="theme-toggle" id="themeToggle">🌙</button>

    <script>
        window.$docsify = {
            name: '网易云音乐 API Enhanced',
            repo: 'https://github.com/neteasecloudmusicapienhanced/api-enhanced',
            coverpage: false,
            homepage: 'home.md',
            loadSidebar: false,
            subMaxLevel: 4,
            auto2top: true,
            nameLink: '/',
            search: {
                maxAge: 86400000,
                paths: 'auto',
                placeholder: '搜索文档...',
                noData: '没有找到相关内容'
            },
            copyCode: {
                buttonText: '复制',
                successText: '已复制 ✓'
            },
            nav: [
                { title: '首页', path: '/' },
                { title: '文档', path: '/home' },
                { title: 'GitHub', path: 'https://github.com/neteasecloudmusicapienhanced/api-enhanced' }
            ]
        };
    </script>

    <script src="https://unpkg.com/docsify@4.11.3/lib/docsify.min.js">
    </script>
    <script src="https://unpkg.com/docsify-plugin-search@2.0.0/dist/search.min.js">
    </script>
    <script src="https://unpkg.com/docsify-copy-code@2.1.1/dist/docsify-copy-code.min.js">
    </script>
    <script src="https://unpkg.com/docsify-plugin-flexible-alerts@1.1.0/docsify-plugin-flexible-alerts.min.js">
    </script>

    <script>
        (function() {
            var STORAGE_KEY = 'docsify-theme';
            var btn = document.getElementById('themeToggle');

            function setTheme(theme) {
                var isDark = (theme === 'dark');
                document.body.classList.toggle('dark', isDark);
                btn.textContent = isDark ? '☀️' : '🌙';
                btn.className = 'theme-toggle' + (isDark ? '' : ' light-mode');
                try { localStorage.setItem(STORAGE_KEY, theme); } catch (e) {}
            }

            function toggleTheme() {
                var isDark = document.body.classList.contains('dark');
                setTheme(isDark ? 'light' : 'dark');
            }

            var saved = localStorage.getItem(STORAGE_KEY);
            if (saved) {
                setTheme(saved);
            } else if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
                setTheme('dark');
            }

            btn.addEventListener('click', toggleTheme);

            try {
                window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', function(e) {
                    if (!localStorage.getItem(STORAGE_KEY)) {
                        setTheme(e.matches ? 'dark' : 'light');
                    }
                });
            } catch (e) {}
        })();
    </script>

    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js').catch(function() {});
        }
    </script>

    <script async src="https://www.googletagmanager.com/gtag/js?id=G-BPRGR23JEG">
    </script>
    <script>
        window.dataLayer = window.dataLayer || [];

        function gtag() { dataLayer.push(arguments); }
        gtag('js', new Date());
        gtag('config', 'G-BPRGR23JEG');
    </script>

</body>
</html>
