<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="keywords" content="网易云音乐,网易云音乐 api,网易云音乐 nodejs">
    <meta name="description" content="网易云音乐 NodeJS API Enhanced">
    <title>网易云音乐 API Enhanced</title>
    <link rel="icon" href="netease.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        /* ---------- 基础变量 ---------- */
        :root {
            --red: #ec4141;
            --red-dark: #b83030;
            --red-light: #fce8e8;
            --red-glow: rgba(236, 65, 65, 0.3);
            --bg: #f0f2f6;
            --card: rgba(255, 255, 255, 0.82);
            --text: #1a1a2e;
            --text-muted: #5a5a7a;
            --border: rgba(0, 0, 0, 0.06);
            --shadow: 0 8px 32px rgba(0, 0, 0, 0.06);
            --radius: 16px;
            --radius-sm: 8px;
            --transition: 0.25s ease;
            --sidebar-width: 280px;
        }

        /* ---------- 重置 ---------- */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.7;
        }

        /* ---------- 滚动条 ---------- */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: var(--bg); }
        ::-webkit-scrollbar-thumb { background: var(--red); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--red-dark); }

        /* ---------- 布局 ---------- */
        .app { display: flex; min-height: 100vh; }

        /* ---------- 侧边栏 ---------- */
        .sidebar {
            position: fixed;
            top: 0;
            left: 0;
            bottom: 0;
            width: var(--sidebar-width);
            background: rgba(255, 255, 255, 0.88);
            backdrop-filter: blur(16px);
            border-right: 1px solid var(--border);
            overflow-y: auto;
            padding: 20px 16px 40px;
            z-index: 100;
            transition: transform 0.3s ease;
        }
        /* 封面页隐藏侧边栏（通过JS添加类） */
        .sidebar.cover-hidden { display: none; }

        .sidebar-brand {
            display: flex;
            align-items: center;
            gap: 12px;
            padding-bottom: 18px;
            border-bottom: 1px solid var(--border);
            margin-bottom: 16px;
        }
        .sidebar-brand img {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            flex-shrink: 0;
        }
        .sidebar-brand .brand-name {
            font-size: 18px;
            font-weight: 700;
            color: var(--red);
            letter-spacing: -0.3px;
        }

        .sidebar-nav ul { list-style: none; }
        .sidebar-nav ul li a {
            display: block;
            padding: 6px 12px;
            border-radius: var(--radius-sm);
            color: var(--text);
            text-decoration: none;
            font-weight: 500;
            font-size: 14px;
            transition: all var(--transition);
            border-left: 3px solid transparent;
        }
        .sidebar-nav ul li a:hover {
            background: var(--red-light);
            color: var(--red);
        }
        .sidebar-nav ul li a.active {
            background: var(--red);
            color: #fff !important;
            border-left-color: var(--red-dark);
            box-shadow: 0 2px 12px var(--red-glow);
        }
        .sidebar-nav ul ul { padding-left: 16px; }
        .sidebar-nav ul ul li a { font-size: 13px; font-weight: 400; padding: 4px 12px; }

        /* 移动端侧边栏切换 */
        .sidebar-toggle {
            display: none;
            position: fixed;
            top: 14px;
            left: 14px;
            z-index: 101;
            background: var(--red);
            color: #fff;
            border: none;
            border-radius: 8px;
            width: 42px;
            height: 42px;
            font-size: 22px;
            cursor: pointer;
            box-shadow: 0 2px 12px var(--red-glow);
            transition: all var(--transition);
        }
        .sidebar-toggle:hover { transform: scale(1.05); }
        .sidebar-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.3);
            z-index: 99;
            backdrop-filter: blur(2px);
        }

        /* ---------- 主内容 ---------- */
        .main {
            flex: 1;
            margin-left: var(--sidebar-width);
            padding: 30px 40px 60px;
            min-height: 100vh;
            transition: margin-left 0.3s ease;
        }
        /* 封面页主内容全宽 */
        .main.cover-active { margin-left: 0 !important; }

        /* ---------- 内容卡片 ---------- */
        .content-card {
            max-width: 920px;
            margin: 0 auto;
            background: var(--card);
            backdrop-filter: blur(6px);
            border-radius: var(--radius);
            padding: 32px 40px 50px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
        }

        /* ---------- 文章排版 ---------- */
        .markdown-body h1 {
            font-size: 2rem;
            font-weight: 700;
            border-bottom: 3px solid var(--red);
            padding-bottom: 12px;
            margin-bottom: 28px;
        }
        .markdown-body h2 {
            font-size: 1.5rem;
            font-weight: 600;
            border-left: 4px solid var(--red);
            padding-left: 16px;
            margin-top: 40px;
            margin-bottom: 16px;
        }
        .markdown-body h3 { font-size: 1.2rem; font-weight: 600; margin-top: 28px; }
        .markdown-body h4 { font-size: 1rem; font-weight: 600; margin-top: 20px; }
        .markdown-body p { margin: 12px 0; }
        .markdown-body a {
            color: var(--red);
            text-decoration: none;
            border-bottom: 1.5px solid transparent;
            transition: border-color var(--transition);
        }
        .markdown-body a:hover { border-bottom-color: var(--red); color: var(--red-dark); }
        .markdown-body ul, .markdown-body ol { padding-left: 24px; margin: 12px 0; }
        .markdown-body li { margin: 4px 0; }
        .markdown-body blockquote {
            border-left: 4px solid var(--red);
            background: rgba(236, 65, 65, 0.05);
            padding: 12px 20px;
            margin: 16px 0;
            border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
            color: var(--text-muted);
        }
        .markdown-body blockquote p { margin: 0; color: inherit; }

        .markdown-body code {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.88em;
            background: var(--red-light);
            color: var(--red-dark);
            padding: 2px 8px;
            border-radius: 4px;
        }
        .markdown-body pre {
            background: #1a1a2e;
            border-radius: var(--radius-sm);
            padding: 18px 22px;
            overflow-x: auto;
            margin: 16px 0;
            border: 1px solid rgba(255,255,255,0.06);
        }
        .markdown-body pre code {
            background: transparent;
            color: #e0e0e8;
            padding: 0;
            font-size: 0.85rem;
            line-height: 1.8;
        }

        .markdown-body table {
            width: 100%;
            border-collapse: collapse;
            margin: 16px 0;
            border-radius: var(--radius-sm);
            overflow: hidden;
            box-shadow: 0 2px 12px rgba(0,0,0,0.04);
        }
        .markdown-body table thead { background: var(--red); color: #fff; }
        .markdown-body table th, .markdown-body table td {
            padding: 10px 16px;
            border: 1px solid var(--border);
            text-align: left;
        }
        .markdown-body table tbody tr:nth-child(even) { background: rgba(0,0,0,0.02); }

        .markdown-body img { max-width: 100%; border-radius: var(--radius-sm); }
        .markdown-body hr { border: none; border-top: 2px solid var(--border); margin: 32px 0; }

        /* ---------- 顶部导航 ---------- */
        .app-nav {
            display: flex;
            gap: 24px;
            padding: 12px 0 16px;
            border-bottom: 1px solid var(--border);
            margin-bottom: 24px;
            flex-wrap: wrap;
        }
        .app-nav a {
            color: var(--text);
            text-decoration: none;
            font-weight: 500;
            font-size: 14px;
            padding: 4px 0;
            border-bottom: 2px solid transparent;
            transition: all var(--transition);
        }
        .app-nav a:hover,
        .app-nav a.active-nav {
            color: var(--red);
            border-bottom-color: var(--red);
        }

        /* ---------- 分页 ---------- */
        .pagination {
            display: flex;
            justify-content: space-between;
            gap: 16px;
            padding-top: 20px;
            margin-top: 32px;
            border-top: 1px solid var(--border);
            flex-wrap: wrap;
        }
        .pagination a {
            color: var(--text);
            text-decoration: none;
            padding: 8px 18px;
            border-radius: var(--radius-sm);
            border: 1px solid var(--border);
            transition: all var(--transition);
            font-size: 14px;
        }
        .pagination a:hover {
            background: var(--red-light);
            border-color: var(--red);
            color: var(--red);
        }

        /* ---------- 封面页（自定义） ---------- */
        .cover-wrapper {
            display: none;
            min-height: 100vh;
            background: linear-gradient(145deg, #0f0707 0%, #1f0e0e 40%, #301515 100%);
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 40px 24px;
            flex-direction: column;
            width: 100%;
        }
        .cover-wrapper.show-cover { display: flex; }
        .cover-wrapper .cover-content { max-width: 720px; }
        .cover-wrapper .cover-logo {
            width: 80px;
            height: 80px;
            border-radius: 20px;
            margin-bottom: 20px;
            box-shadow: 0 8px 40px var(--red-glow);
        }
        .cover-wrapper .cover-title {
            font-size: 3rem;
            font-weight: 800;
            letter-spacing: -1px;
            margin-bottom: 12px;
        }
        .cover-wrapper .cover-title .highlight { color: var(--red); }
        .cover-wrapper .cover-desc {
            font-size: 1.1rem;
            color: rgba(255,255,255,0.75);
            max-width: 560px;
            margin: 0 auto 32px;
            line-height: 1.8;
        }
        .cover-wrapper .cover-buttons {
            display: flex;
            gap: 16px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .cover-wrapper .cover-buttons a {
            display: inline-block;
            padding: 12px 36px;
            border-radius: 30px;
            font-weight: 600;
            text-decoration: none;
            transition: all var(--transition);
            font-size: 15px;
        }
        .cover-wrapper .cover-buttons .btn-primary {
            background: var(--red);
            color: #fff;
            box-shadow: 0 4px 24px var(--red-glow);
        }
        .cover-wrapper .cover-buttons .btn-primary:hover {
            background: var(--red-dark);
            transform: translateY(-2px);
            box-shadow: 0 8px 32px var(--red-glow);
        }
        .cover-wrapper .cover-buttons .btn-secondary {
            background: transparent;
            color: rgba(255,255,255,0.85);
            border: 2px solid rgba(255,255,255,0.25);
        }
        .cover-wrapper .cover-buttons .btn-secondary:hover {
            border-color: var(--red);
            color: #fff;
            transform: translateY(-2px);
        }
        .cover-wrapper .cover-meta {
            margin-top: 36px;
            font-size: 13px;
            color: rgba(255,255,255,0.4);
            letter-spacing: 0.5px;
        }

        /* ---------- 主题切换按钮 ---------- */
        .theme-toggle {
            position: fixed;
            bottom: 24px;
            right: 24px;
            z-index: 200;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            border: none;
            background: linear-gradient(135deg, var(--red), var(--red-dark));
            color: #fff;
            font-size: 22px;
            cursor: pointer;
            box-shadow: 0 4px 20px var(--red-glow);
            transition: all 0.3s cubic-bezier(0.4,0,0.2,1);
            display: flex;
            align-items: center;
            justify-content: center;
            outline: none;
            user-select: none;
        }
        .theme-toggle:hover { transform: scale(1.1) rotate(6deg); box-shadow: 0 6px 32px var(--red-glow); }
        .theme-toggle:active { transform: scale(0.92); }
        .theme-toggle.light-mode {
            background: rgba(255,255,255,0.9);
            color: var(--text);
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        }
        .theme-toggle.light-mode:hover { box-shadow: 0 6px 28px rgba(0,0,0,0.14); }

        /* ---------- 深色模式 ---------- */
        body.dark {
            --bg: #12121e;
            --card: rgba(28,28,44,0.82);
            --text: #e8e8f0;
            --text-muted: #8888aa;
            --border: rgba(255,255,255,0.06);
            --shadow: 0 8px 32px rgba(0,0,0,0.3);
        }
        body.dark .sidebar { background: rgba(18,18,30,0.92); border-right-color: var(--border); }
        body.dark .sidebar-nav ul li a { color: #c8c8d8; }
        body.dark .sidebar-nav ul li a:hover { background: rgba(236,65,65,0.15); color: var(--red); }
        body.dark .sidebar-nav ul li a.active { background: var(--red); color: #fff !important; }
        body.dark .markdown-body code { background: rgba(236,65,65,0.15); color: #f0a0a0; }
        body.dark .markdown-body pre { background: #0a0a14; }
        body.dark .markdown-body blockquote { background: rgba(236,65,65,0.08); }
        body.dark .markdown-body table tbody tr:nth-child(even) { background: rgba(255,255,255,0.02); }
        body.dark .app-nav a { color: #c8c8d8; }
        body.dark .app-nav a:hover, body.dark .app-nav a.active-nav { color: var(--red); border-bottom-color: var(--red); }
        body.dark .pagination a { color: #c8c8d8; border-color: var(--border); }
        body.dark .pagination a:hover { background: rgba(236,65,65,0.12); border-color: var(--red); color: var(--red); }
        body.dark .cover-wrapper { background: linear-gradient(145deg, #080404 0%, #140a0a 40%, #1f0e0e 100%); }

        /* ---------- 响应式 ---------- */
        @media (max-width: 768px) {
            .sidebar {
                transform: translateX(-100%);
                display: block !important;
            }
            .sidebar.open { transform: translateX(0); }
            .sidebar-overlay.open { display: block; }
            .sidebar-toggle { display: flex; align-items: center; justify-content: center; }
            .main { margin-left: 0 !important; padding: 16px 12px 40px; }
            .content-card { padding: 20px 16px 32px; border-radius: 12px; }
            .cover-wrapper .cover-title { font-size: 2.2rem; }
            .cover-wrapper .cover-desc { font-size: 0.95rem; }
            .cover-wrapper .cover-buttons a { padding: 10px 24px; font-size: 14px; }
            .app-nav { gap: 14px; font-size: 13px; }
            .theme-toggle { width: 42px; height: 42px; font-size: 18px; bottom: 16px; right: 16px; }
        }

        /* ---------- 加载状态 ---------- */
        .app-loading {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 60vh;
            color: var(--text-muted);
            font-size: 15px;
        }
        .app-loading::after {
            content: '';
            width: 24px;
            height: 24px;
            margin-left: 12px;
            border: 3px solid var(--border);
            border-top-color: var(--red);
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <!-- 侧边栏切换按钮 -->
    <button class="sidebar-toggle" id="sidebarToggle" aria-label="切换侧边栏">☰</button>
    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <div class="app">
        <!-- 侧边栏 -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-brand">
                <img src="netease.png" alt="网易云音乐">
                <span class="brand-name">网易云音乐 API</span>
            </div>
            <nav class="sidebar-nav" id="sidebarNav">
                <div class="app-loading" style="min-height:auto;padding:20px 0;font-size:13px;">加载中...</div>
            </nav>
        </aside>

        <!-- 主内容 -->
        <main class="main" id="mainContent">
            <div id="docsify-content">
                <div class="app-loading">加载文档中...</div>
            </div>
        </main>
    </div>

    <!-- 主题切换按钮 -->
    <button class="theme-toggle" id="themeToggle" aria-label="切换主题">🌙</button>

    <!-- ============ Docsify 配置 ============ -->
    <script>
        window.$docsify = {
            name: '网易云音乐 API Enhanced',
            repo: 'https://github.com/neteasecloudmusicapienhanced/api-enhanced',
            coverpage: true,
            homepage: 'home.md',
            loadSidebar: false,
            subMaxLevel: 4,
            auto2top: true,
            nameLink: '/',
            relativePath: true,
            search: {
                maxAge: 86400000,
                paths: 'auto',
                placeholder: '搜索文档...',
                noData: '没有找到相关内容'
            },
            copyCode: {
                buttonText: '复制',
                successText: '已复制 ✓'
            },
            nav: [
                { title: '首页', path: '/' },
                { title: '文档', path: '/home' },
                { title: 'GitHub', path: 'https://github.com/neteasecloudmusicapienhanced/api-enhanced' }
            ],
            // 核心钩子：页面渲染完成后处理侧边栏和封面
            done: function() {
                // 1. 迁移侧边栏内容
                var docsifySidebar = document.querySelector('.sidebar-nav');
                var customNav = document.getElementById('sidebarNav');
                if (docsifySidebar && customNav) {
                    customNav.innerHTML = docsifySidebar.innerHTML;
                    docsifySidebar.style.display = 'none';
                    // 绑定关闭侧边栏事件（移动端）
                    customNav.querySelectorAll('a').forEach(function(link) {
                        link.addEventListener('click', function() { closeSidebar(); });
                    });
                    // 更新激活状态
                    updateActiveLink();
                }

                // 2. 处理封面
                updateCoverState();

                // 3. 移除加载状态
                var loading = document.querySelector('#docsify-content .app-loading');
                if (loading) loading.remove();
            },
            // 每次页面切换后执行
            afterEach: function(html) {
                setTimeout(function() {
                    updateActiveLink();
                    updateCoverState();
                }, 50);
                return html;
            }
        };

        // ---- 辅助函数 ----
        function updateActiveLink() {
            var path = window.location.pathname;
            document.querySelectorAll('.sidebar-nav ul li a').forEach(function(link) {
                var href = link.getAttribute('href');
                link.classList.toggle('active', href && path.endsWith(href.replace(/^\.\//, '')));
            });
        }

        function updateCoverState() {
            var cover = document.querySelector('.cover');
            var sidebar = document.getElementById('sidebar');
            var main = document.getElementById('mainContent');
            if (cover) {
                sidebar.classList.add('cover-hidden');
                main.classList.add('cover-active');
                // 移动端关闭侧边栏
                closeSidebar();
            } else {
                sidebar.classList.remove('cover-hidden');
                main.classList.remove('cover-active');
            }
        }

        // ---- 移动端侧边栏控制 ----
        function openSidebar() {
            document.getElementById('sidebar').classList.add('open');
            document.getElementById('sidebarOverlay').classList.add('open');
            document.body.style.overflow = 'hidden';
        }
        function closeSidebar() {
            document.getElementById('sidebar').classList.remove('open');
            document.getElementById('sidebarOverlay').classList.remove('open');
            document.body.style.overflow = '';
        }

        // ---- 事件绑定 ----
        document.addEventListener('DOMContentLoaded', function() {
            document.getElementById('sidebarToggle').addEventListener('click', function(e) {
                e.stopPropagation();
                var sidebar = document.getElementById('sidebar');
                sidebar.classList.contains('open') ? closeSidebar() : openSidebar();
            });
            document.getElementById('sidebarOverlay').addEventListener('click', closeSidebar);
            window.addEventListener('resize', function() {
                if (window.innerWidth > 768) closeSidebar();
            });
        });
    </script>

    <!-- 加载 Docsify 及插件 -->
    <script src="https://unpkg.com/docsify@4.11.3/lib/docsify.min.js"></script>
    <script src="https://unpkg.com/docsify-plugin-search@2.0.0/dist/search.min.js"></script>
    <script src="https://unpkg.com/docsify-copy-code@2.1.1/dist/docsify-copy-code.min.js"></script>
    <script src="https://unpkg.com/docsify-plugin-flexible-alerts@1.1.0/docsify-plugin-flexible-alerts.min.js"></script>

    <!-- ============ 主题切换 ============ -->
    <script>
        (function() {
            var STORAGE_KEY = 'docsify-theme';
            var btn = document.getElementById('themeToggle');

            function setTheme(theme) {
                document.body.classList.toggle('dark', theme === 'dark');
                btn.textContent = theme === 'dark' ? '☀️' : '🌙';
                btn.className = 'theme-toggle' + (theme === 'dark' ? '' : ' light-mode');
                try { localStorage.setItem(STORAGE_KEY, theme); } catch(e) {}
            }

            function toggleTheme() {
                var isDark = document.body.classList.contains('dark');
                setTheme(isDark ? 'light' : 'dark');
            }

            var saved = localStorage.getItem(STORAGE_KEY);
            if (saved) {
                setTheme(saved);
            } else if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
                setTheme('dark');
            }

            btn.addEventListener('click', toggleTheme);

            try {
                window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', function(e) {
                    if (!localStorage.getItem(STORAGE_KEY)) {
                        setTheme(e.matches ? 'dark' : 'light');
                    }
                });
            } catch(e) {}
        })();
    </script>

    <!-- PWA Service Worker -->
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js').catch(function() {});
        }
    </script>

    <!-- Google Analytics -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-BPRGR23JEG"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){ dataLayer.push(arguments); }
        gtag('js', new Date());
        gtag('config', 'G-BPRGR23JEG');
    </script>
</body>
</html>
