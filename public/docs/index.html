    /* ===== 品牌色彩 ===== */
    :root {

      --brand-red-dark: #c23333;

      backdrop-filter: blur(12px);

    .sidebar-nav ul li a {
      border-radius: 6px;
      padding: 5px 12px;
      margin: 2px 0;
      transition: all 0.2s;

      font-size: 14px;

    .sidebar-nav ul li a:hover {

      color: var(--brand-red) !important;
    }
    .sidebar-nav ul li a.active {

      color: #fff !important;

    }

    /* 侧边栏标题（项目名） */
    .app-name-link {
      font-weight: 700 !important;

      letter-spacing: -0.3px;
    }

      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
    }

    /* ===== 内容区域 ===== */
    .content { padding-top: 30px; background: transparent; }
    .markdown-section {
      max-width: 900px;
      margin: 0 auto;
      padding: 20px 30px 60px;
      background: rgba(255, 255, 255, 0.7);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      border-radius: var(--radius-lg);
      box-shadow: 0 8px 40px rgba(0, 0, 0, 0.04);

    body.dark .markdown-section {
      background: rgba(30, 30, 46, 0.75);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      box-shadow: 0 8px 40px rgba(0, 0, 0, 0.25);
    }

    .markdown-section h1 {

      margin-bottom: 28px;

    }
    .markdown-section h2 {
      font-weight: 600;
      border-left: 4px solid var(--brand-red);
      padding-left: 16px;
      margin-top: 40px;
      color: var(--heading-color, #1a1a2e);
    }
    .markdown-section h3 { font-weight: 600; color: var(--heading-color, #2a2a4a); }
    .markdown-section h4 { font-weight: 600; color: var(--heading-color, #3a3a5a); }
    .markdown-section p, .markdown-section li { line-height: 1.8; color: var(--text-color, #333); }
    .markdown-section a {
      color: var(--brand-red);
      text-decoration: none;
      border-bottom: 1.5px solid transparent;
      transition: border-color 0.2s;
    }
    .markdown-section a:hover { border-bottom-color: var(--brand-red); }

    .markdown-section pre {
      border-radius: var(--radius-sm);
      background: #1e1e2e !important;
      padding: 16px 20px;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.06);
    }
    .markdown-section code {
      font-family: 'JetBrains Mono', 'Fira Code', monospace;
      font-size: 0.9em;
      background: rgba(236, 65, 65, 0.06);
      padding: 2px 8px;
      border-radius: 4px;
      color: var(--brand-red-dark);
    }
    .markdown-section pre code {
      background: transparent;
      color: #e0e0e0;
      padding: 0;
    }

    .markdown-section table {
      border-collapse: collapse;
      width: 100%;
      border-radius: var(--radius-sm);
      overflow: hidden;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.04);
    }
    .markdown-section table thead { background: var(--brand-red); color: #fff; }

      border: 1px solid rgba(0,0,0,0.06);

    .markdown-section table tbody tr:nth-child(even) { background: rgba(0, 0, 0, 0.02); }

    .markdown-section blockquote {
      border-left: 4px solid var(--brand-red);
      background: rgba(236, 65, 65, 0.05);
      padding: 12px 20px;
      border-radius: 0 var(--radius-sm) var(--radius-sm) 0;

    }

    /* ===== 顶部导航 ===== */
    .app-nav {
      padding: 10px 20px;
      background: rgba(255, 255, 255, 0.6);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(0, 0, 0, 0.04);

    .app-nav a { color: var(--text-color, #333) !important; font-weight: 500; }
    .app-nav a:hover { color: var(--brand-red) !important; }
    .app-nav a::before { background: var(--brand-red) !important; }

    /* ===== 主题切换按钮 ===== */
    .theme-toggle {

      bottom: 28px;
      right: 28px;
      z-index: 999;
      width: 52px;
      height: 52px;
      border-radius: 50%;
      border: none;
      background: linear-gradient(135deg, var(--brand-red), var(--brand-red-dark));
      color: #fff;
      font-size: 24px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 20px var(--brand-shadow);
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      outline: none;
      padding: 0;
      user-select: none;
    }
    .theme-toggle:hover { transform: scale(1.12) rotate(8deg); box-shadow: 0 6px 32px var(--brand-shadow); }
    .theme-toggle:active { transform: scale(0.92); }
    .theme-toggle.light {
      background: rgba(255, 255, 255, 0.85);
      color: #333;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.10);
    }

    /* ===== 分页 ===== */
    .docsify-pagination-container {
      border-top: 1px solid rgba(0, 0, 0, 0.06);
      padding-top: 20px;
      margin-top: 40px;

    /* ===== 暗色模式 ===== */
    body.dark .sidebar {
      background: rgba(20, 20, 32, 0.88);
      border-right-color: rgba(255,255,255,0.04);
    }

    body.dark .markdown-section h2,
    body.dark .markdown-section h3,
    body.dark .markdown-section h4 { color: #e8e8f0; }
    body.dark .markdown-section p,
    body.dark .markdown-section li { color: #c8c8d8; }
    body.dark .markdown-section code { background: rgba(236, 65, 65, 0.15); color: #f0a0a0; }
    body.dark .markdown-section pre { background: #0e0e1a !important; }
    body.dark .app-nav { background: rgba(20, 20, 32, 0.7); border-bottom-color: rgba(255,255,255,0.04); }
    body.dark .app-nav a { color: #c8c8d8 !important; }
    body.dark .app-nav a:hover { color: var(--brand-red) !important; }
    body.dark .sidebar-nav ul li a { color: #b0b0c8; }
    body.dark .sidebar-nav ul li a:hover { background: rgba(236, 65, 65, 0.15); color: #fff !important; }
    body.dark .sidebar-nav ul li a.active { background: var(--brand-red); color: #fff !important; }

    /* ===== 响应式 ===== */
    @media (max-width: 768px) {
      .markdown-section { padding: 16px 18px 40px; border-radius: 16px; margin: 0 10px; background: rgba(255, 255, 255, 0.8); }
      .sidebar { background: rgba(255, 255, 255, 0.92); backdrop-filter: blur(16px); }
      .theme-toggle { width: 44px; height: 44px; font-size: 20px; bottom: 20px; right: 20px; }
    }

    /* ===== 加载动画占位（可选） ===== */
    .shimmer {
      background: linear-gradient(90deg, var(--panel) 25%, var(--bg) 50%, var(--panel) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.8s infinite;
      border-radius: 4px;
    }
    @keyframes shimmer {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

<body>
  <div id="app"></div>
  <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">🌙</button>

  <!-- ===== 主题切换逻辑 ===== -->
  <script>
    (function() {
      var STORAGE_KEY = 'docsify-theme';
      var link = document.getElementById('theme-css');
      var btn = document.getElementById('themeToggle');
      var LIGHT_URL = '//unpkg.com/docsify/lib/themes/vue.css';
      var DARK_URL = '//unpkg.com/docsify/lib/themes/dark.css';

      function setTheme(theme) {
        link.href = theme === 'dark' ? DARK_URL : LIGHT_URL;
        btn.textContent = theme === 'dark' ? '☀️' : '🌙';
        btn.className = 'theme-toggle' + (theme === 'dark' ? '' : ' light');
        document.body.classList.toggle('dark', theme === 'dark');
        localStorage.setItem(STORAGE_KEY, theme);
      }

      function toggleTheme() {
        var isDark = link.href.includes('dark');
        setTheme(isDark ? 'light' : 'dark');
      }

      var saved = localStorage.getItem(STORAGE_KEY);
      if (saved) {
        setTheme(saved);
      } else if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
        setTheme('dark');
      }

      btn.addEventListener('click', toggleTheme);

      try {
        window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', function(e) {
          if (!localStorage.getItem(STORAGE_KEY)) {
            setTheme(e.matches ? 'dark' : 'light');
          }
        });
      } catch(e) {}
    })();
  </script>
