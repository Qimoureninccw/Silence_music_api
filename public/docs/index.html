<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>网易云音乐 API Enhanced</title>
    <link rel="icon" href="netease.png" />

    <!-- Docsify 默认主题（会被 CSS 完全覆盖） -->
    <link rel="stylesheet" href="//unpkg.com/docsify/lib/themes/vue.css" />

    <!-- 使用 Inter 字体，更现代 -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet" />

    <style>
        /* ============================================================
                   现代化 UI — 完全覆盖 Docsify 默认样式
                   ============================================================ */

        /* ----- 变量 ----- */
        :root {
            --red: #e5484d;
            --red-dark: #cd2b31;
            --red-light: #fde8e8;
            --red-glow: rgba(229, 72, 77, 0.25);
            --bg: #f6f8fa;
            --surface: #ffffff;
            --surface-hover: #f1f3f5;
            --text: #1a1a2e;
            --text-secondary: #5a5a7a;
            --text-tertiary: #8a8aaa;
            --border: #eaeef2;
            --shadow-sm: 0 1px 3px rgba(0, 0, 0, 0.04);
            --shadow-md: 0 8px 32px rgba(0, 0, 0, 0.07);
            --shadow-lg: 0 16px 56px rgba(0, 0, 0, 0.10);
            --radius: 20px;
            --radius-sm: 10px;
            --transition: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            --sidebar-width: 270px;
            --font: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        /* ----- 基础 ----- */
        body {
            font-family: var(--font);
            background: var(--bg);
            color: var(--text);
            line-height: 1.65;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        /* ============================================================
                   侧边栏 — 毛玻璃 + 精致
                   ============================================================ */
        .sidebar {
            background: rgba(255, 255, 255, 0.72) !important;
            backdrop-filter: blur(20px) saturate(1.6) !important;
            -webkit-backdrop-filter: blur(20px) saturate(1.6) !important;
            border-right: 1px solid rgba(0, 0, 0, 0.05) !important;
            box-shadow: 4px 0 24px rgba(0, 0, 0, 0.03) !important;
            padding-top: 28px !important;
            width: var(--sidebar-width) !important;
        }

        .app-name-link {
            font-size: 17px !important;
            font-weight: 700 !important;
            color: var(--red) !important;
            letter-spacing: -0.4px !important;
            padding: 0 20px 20px !important;
            border-bottom: 1px solid var(--border) !important;
            display: block !important;
        }

        .app-name-link img {
            border-radius: 10px !important;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.06) !important;
        }

        /* 侧边栏导航 */
        .sidebar-nav {
            padding: 12px 12px 20px !important;
        }

        .sidebar-nav ul {
            list-style: none !important;
            padding: 0 !important;
            margin: 0 !important;
        }

        .sidebar-nav ul li {
            margin: 1px 0 !important;
        }

        .sidebar-nav ul li a {
            display: block !important;
            padding: 7px 14px !important;
            border-radius: var(--radius-sm) !important;
            color: var(--text-secondary) !important;
            font-weight: 500 !important;
            font-size: 14px !important;
            transition: all var(--transition) !important;
            border-left: 3px solid transparent !important;
            text-decoration: none !important;
        }

        .sidebar-nav ul li a:hover {
            background: var(--surface-hover) !important;
            color: var(--text) !important;
        }

        .sidebar-nav ul li a.active {
            background: var(--red) !important;
            color: #fff !important;
            border-left-color: var(--red-dark) !important;
            box-shadow: 0 2px 16px var(--red-glow) !important;
        }

        /* 侧边栏二级标题 */
        .sidebar-nav ul ul {
            padding-left: 12px !important;
        }

        .sidebar-nav ul ul li a {
            font-size: 13px !important;
            font-weight: 400 !important;
            padding: 5px 14px !important;
            color: var(--text-tertiary) !important;
        }

        .sidebar-nav ul ul li a:hover {
            color: var(--text) !important;
        }

        .sidebar-nav ul ul li a.active {
            background: var(--red) !important;
            color: #fff !important;
        }

        /* ============================================================
                   主内容 — 干净、留白
                   ============================================================ */
        .content {
            padding-top: 28px !important;
            background: transparent !important;
        }

        .markdown-section {
            max-width: 880px !important;
            margin: 0 auto !important;
            padding: 36px 44px 56px !important;
            background: var(--surface) !important;
            border-radius: var(--radius) !important;
            box-shadow: var(--shadow-md) !important;
            border: 1px solid rgba(0, 0, 0, 0.04) !important;
            transition: box-shadow var(--transition) !important;
        }

        .markdown-section:hover {
            box-shadow: var(--shadow-lg) !important;
        }

        /* ============================================================
                   排版 — 精致、舒适
                   ============================================================ */
        .markdown-section h1 {
            font-size: 2rem !important;
            font-weight: 700 !important;
            letter-spacing: -0.5px !important;
            border-bottom: 2px solid var(--border) !important;
            padding-bottom: 16px !important;
            margin-bottom: 28px !important;
            color: var(--text) !important;
            position: relative !important;
        }

        .markdown-section h1::after {
            content: '' !important;
            position: absolute !important;
            bottom: -2px !important;
            left: 0 !important;
            width: 48px !important;
            height: 3px !important;
            background: var(--red) !important;
            border-radius: 2px !important;
        }

        .markdown-section h2 {
            font-size: 1.4rem !important;
            font-weight: 600 !important;
            letter-spacing: -0.3px !important;
            margin-top: 42px !important;
            margin-bottom: 14px !important;
            padding-left: 0 !important;
            border-left: none !important;
            color: var(--text) !important;
            border-bottom: 1px solid var(--border) !important;
            padding-bottom: 8px !important;
        }

        .markdown-section h2:first-of-type {
            margin-top: 0 !important;
        }

        .markdown-section h3 {
            font-size: 1.15rem !important;
            font-weight: 600 !important;
            margin-top: 30px !important;
            margin-bottom: 10px !important;
            color: var(--text) !important;
        }

        .markdown-section h4 {
            font-size: 1rem !important;
            font-weight: 600 !important;
            margin-top: 22px !important;
            color: var(--text) !important;
        }

        .markdown-section p {
            margin: 12px 0 !important;
            color: var(--text-secondary) !important;
            font-size: 15px !important;
        }

        .markdown-section a {
            color: var(--red) !important;
            text-decoration: none !important;
            border-bottom: 1.5px solid transparent !important;
            transition: all var(--transition) !important;
            font-weight: 500 !important;
        }

        .markdown-section a:hover {
            border-bottom-color: var(--red) !important;
            color: var(--red-dark) !important;
        }

        .markdown-section ul,
        .markdown-section ol {
            padding-left: 24px !important;
            margin: 12px 0 !important;
        }

        .markdown-section li {
            margin: 4px 0 !important;
            color: var(--text-secondary) !important;
        }

        .markdown-section blockquote {
            border-left: 4px solid var(--red) !important;
            background: var(--red-light) !important;
            padding: 14px 22px !important;
            margin: 18px 0 !important;
            border-radius: 0 var(--radius-sm) var(--radius-sm) 0 !important;
            color: var(--text-secondary) !important;
        }

        .markdown-section blockquote p {
            margin: 0 !important;
            color: inherit !important;
        }

        /* ----- 代码 ----- */
        .markdown-section code {
            font-family: 'SF Mono', 'Fira Code', 'JetBrains Mono', monospace !important;
            font-size: 0.82em !important;
            background: var(--red-light) !important;
            color: var(--red-dark) !important;
            padding: 2px 10px !important;
            border-radius: 6px !important;
            font-weight: 500 !important;
        }

        .markdown-section pre {
            background: #0f0f1a !important;
            border-radius: var(--radius-sm) !important;
            padding: 18px 24px !important;
            overflow-x: auto !important;
            margin: 18px 0 !important;
            border: 1px solid rgba(255, 255, 255, 0.04) !important;
        }

        .markdown-section pre code {
            background: transparent !important;
            color: #d4d4e0 !important;
            padding: 0 !important;
            font-size: 0.82rem !important;
            line-height: 1.8 !important;
            font-weight: 400 !important;
        }

        /* ----- 表格 ----- */
        .markdown-section table {
            width: 100% !important;
            border-collapse: collapse !important;
            margin: 18px 0 !important;
            border-radius: var(--radius-sm) !important;
            overflow: hidden !important;
            font-size: 14px !important;
            box-shadow: var(--shadow-sm) !important;
        }

        .markdown-section table thead {
            background: var(--red) !important;
            color: #fff !important;
        }

        .markdown-section table th {
            font-weight: 600 !important;
            padding: 12px 18px !important;
            text-align: left !important;
        }

        .markdown-section table td {
            padding: 10px 18px !important;
            border-bottom: 1px solid var(--border) !important;
        }

        .markdown-section table tbody tr:last-child td {
            border-bottom: none !important;
        }

        .markdown-section table tbody tr:nth-child(even) {
            background: rgba(0, 0, 0, 0.02) !important;
        }

        .markdown-section table tbody tr:hover {
            background: var(--surface-hover) !important;
        }

        /* ----- 图片 ----- */
        .markdown-section img {
            max-width: 100% !important;
            border-radius: var(--radius-sm) !important;
            box-shadow: var(--shadow-sm) !important;
        }

        /* ----- 分割线 ----- */
        .markdown-section hr {
            border: none !important;
            border-top: 2px solid var(--border) !important;
            margin: 36px 0 !important;
        }

        /* ============================================================
                   顶部导航
                   ============================================================ */
        .app-nav {
            background: rgba(255, 255, 255, 0.6) !important;
            backdrop-filter: blur(16px) !important;
            -webkit-backdrop-filter: blur(16px) !important;
            border-bottom: 1px solid rgba(0, 0, 0, 0.04) !important;
            padding: 12px 24px !important;
            display: flex !important;
            gap: 28px !important;
            align-items: center !important;
        }

        .app-nav a {
            color: var(--text-secondary) !important;
            font-weight: 500 !important;
            font-size: 14px !important;
            padding: 4px 0 !important;
            border-bottom: 2px solid transparent !important;
            transition: all var(--transition) !important;
            text-decoration: none !important;
        }

        .app-nav a:hover {
            color: var(--text) !important;
            border-bottom-color: var(--red) !important;
        }

        .app-nav a::before {
            display: none !important;
        }

        /* ============================================================
                   分页
                   ============================================================ */
        .docsify-pagination-container {
            border-top: 1px solid var(--border) !important;
            padding-top: 24px !important;
            margin-top: 36px !important;
            display: flex !important;
            justify-content: space-between !important;
            gap: 16px !important;
        }

        .pagination-item {
            border: 1px solid var(--border) !important;
            border-radius: var(--radius-sm) !important;
            padding: 8px 20px !important;
            transition: all var(--transition) !important;
            background: transparent !important;
        }

        .pagination-item:hover {
            background: var(--surface-hover) !important;
            border-color: var(--red) !important;
            transform: translateY(-1px) !important;
        }

        .pagination-item .pagination-label {
            color: var(--text-tertiary) !important;
            font-size: 12px !important;
            font-weight: 500 !important;
        }

        .pagination-item .pagination-title {
            color: var(--text) !important;
            font-weight: 500 !important;
        }

        /* ============================================================
                   搜索框
                   ============================================================ */
        .search .input-wrap input {
            border-radius: var(--radius-sm) !important;
            border: 1px solid var(--border) !important;
            padding: 8px 16px 8px 38px !important;
            font-family: var(--font) !important;
            font-size: 14px !important;
            transition: all var(--transition) !important;
            background: rgba(255, 255, 255, 0.8) !important;
            backdrop-filter: blur(8px) !important;
            -webkit-backdrop-filter: blur(8px) !important;
        }

        .search .input-wrap input:focus {
            border-color: var(--red) !important;
            box-shadow: 0 0 0 3px var(--red-glow) !important;
            outline: none !important;
        }

        .search .input-wrap .search-icon {
            color: var(--text-tertiary) !important;
        }

        /* ============================================================
                   移动端菜单按钮
                   ============================================================ */
        .sidebar-toggle {
            background: var(--surface) !important;
            color: var(--text) !important;
            border: 1px solid var(--border) !important;
            border-radius: var(--radius-sm) !important;
            box-shadow: var(--shadow-sm) !important;
            transition: all var(--transition) !important;
            width: 42px !important;
            height: 42px !important;
            font-size: 20px !important;
        }

        .sidebar-toggle:hover {
            background: var(--surface-hover) !important;
            transform: scale(1.04) !important;
        }

        /* ============================================================
                   主题切换按钮
                   ============================================================ */
        .theme-toggle {
            position: fixed;
            bottom: 28px;
            right: 28px;
            z-index: 200;
            width: 46px;
            height: 46px;
            border-radius: 50%;
            border: 1px solid var(--border);
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            color: var(--text-secondary);
            font-size: 20px;
            cursor: pointer;
            box-shadow: var(--shadow-sm);
            transition: all var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
            outline: none;
        }

        .theme-toggle:hover {
            transform: scale(1.08);
            box-shadow: var(--shadow-md);
            border-color: var(--red);
            color: var(--red);
        }

        .theme-toggle.light-mode {
            background: rgba(255, 255, 255, 0.9);
        }

        /* ============================================================
                   深色模式
                   ============================================================ */
        body.dark {
            --bg: #0e0e18;
            --surface: #161624;
            --surface-hover: #1e1e32;
            --text: #e8e8f0;
            --text-secondary: #b0b0c8;
            --text-tertiary: #6a6a88;
            --border: #2a2a3e;
            --shadow-sm: 0 1px 3px rgba(0, 0, 0, 0.3);
            --shadow-md: 0 8px 32px rgba(0, 0, 0, 0.4);
            --shadow-lg: 0 16px 56px rgba(0, 0, 0, 0.5);
            --red-light: rgba(229, 72, 77, 0.15);
        }

        body.dark .sidebar {
            background: rgba(22, 22, 36, 0.85) !important;
            border-right-color: var(--border) !important;
        }

        body.dark .sidebar-nav ul li a {
            color: var(--text-secondary) !important;
        }

        body.dark .sidebar-nav ul li a:hover {
            background: var(--surface-hover) !important;
            color: var(--text) !important;
        }

        body.dark .sidebar-nav ul li a.active {
            background: var(--red) !important;
            color: #fff !important;
        }

        body.dark .app-nav {
            background: rgba(14, 14, 24, 0.7) !important;
            border-bottom-color: var(--border) !important;
        }

        body.dark .app-nav a {
            color: var(--text-secondary) !important;
        }

        body.dark .app-nav a:hover {
            color: var(--text) !important;
        }

        body.dark .markdown-section code {
            background: rgba(229, 72, 77, 0.18) !important;
            color: #f0a0a0 !important;
        }

        body.dark .markdown-section pre {
            background: #0a0a14 !important;
        }

        body.dark .markdown-section blockquote {
            background: rgba(229, 72, 77, 0.08) !important;
        }

        body.dark .markdown-section table tbody tr:nth-child(even) {
            background: rgba(255, 255, 255, 0.02) !important;
        }

        body.dark .markdown-section table tbody tr:hover {
            background: rgba(255, 255, 255, 0.04) !important;
        }

        body.dark .pagination-item {
            border-color: var(--border) !important;
        }

        body.dark .pagination-item:hover {
            background: var(--surface-hover) !important;
        }

        body.dark .search .input-wrap input {
            background: rgba(22, 22, 36, 0.8) !important;
            border-color: var(--border) !important;
            color: var(--text) !important;
        }

        body.dark .theme-toggle {
            background: rgba(22, 22, 36, 0.85);
            border-color: var(--border);
            color: var(--text-secondary);
        }

        body.dark .theme-toggle:hover {
            border-color: var(--red);
            color: var(--red);
        }

        body.dark .sidebar-toggle {
            background: var(--surface) !important;
            border-color: var(--border) !important;
            color: var(--text-secondary) !important;
        }

        /* ============================================================
                   滚动条
                   ============================================================ */
        ::-webkit-scrollbar {
            width: 5px;
            height: 5px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 4px;
            transition: background var(--transition);
        }
        ::-webkit-scrollbar-thumb:hover {
            background: var(--red);
        }

        /* ============================================================
                   响应式
                   ============================================================ */
        @media (max-width: 768px) {
            .markdown-section {
                padding: 20px 18px 32px !important;
                border-radius: 14px !important;
                margin: 0 8px !important;
            }

            .markdown-section h1 {
                font-size: 1.6rem !important;
            }

            .markdown-section h2 {
                font-size: 1.2rem !important;
            }

            .content {
                padding-top: 14px !important;
            }

            .app-nav {
                padding: 10px 16px !important;
                gap: 18px !important;
            }

            .app-nav a {
                font-size: 13px !important;
            }

            .theme-toggle {
                width: 40px;
                height: 40px;
                font-size: 17px;
                bottom: 16px;
                right: 16px;
            }
        }

        @media (max-width: 480px) {
            .markdown-section {
                padding: 16px 12px 24px !important;
                border-radius: 12px !important;
                margin: 0 4px !important;
            }

            .markdown-section h1 {
                font-size: 1.3rem !important;
            }
        }
    </style>
</head>
<body>

    <div id="app"></div>

    <!-- 主题切换按钮 -->
    <button class="theme-toggle" id="themeToggle" aria-label="切换主题">🌙</button>

    <script>
        // ============================================================
        // Docsify 配置 — 最简、稳定
        // ============================================================
        window.$docsify = {
            name: '网易云音乐 API Enhanced',
            repo: 'https://github.com/neteasecloudmusicapienhanced/api-enhanced',
            coverpage: false,
            homepage: 'home.md',
            loadSidebar: false,
            subMaxLevel: 4,
            auto2top: true,
            nameLink: '/',
            search: {
                maxAge: 86400000,
                paths: 'auto',
                placeholder: '搜索文档...',
                noData: '没有找到相关内容'
            },
            copyCode: {
                buttonText: '复制',
                successText: '已复制 ✓'
            },
            nav: [
                { title: '首页', path: '/' },
                { title: '文档', path: '/home' },
                { title: 'GitHub', path: 'https://github.com/neteasecloudmusicapienhanced/api-enhanced' }
            ]
        };
    </script>

    <!-- 加载 Docsify 及插件 -->
    <script src="https://unpkg.com/docsify@4.11.3/lib/docsify.min.js">
    </script>
    <script src="https://unpkg.com/docsify-plugin-search@2.0.0/dist/search.min.js">
    </script>
    <script src="https://unpkg.com/docsify-copy-code@2.1.1/dist/docsify-copy-code.min.js">
    </script>
    <script src="https://unpkg.com/docsify-plugin-flexible-alerts@1.1.0/docsify-plugin-flexible-alerts.min.js">
    </script>

    <!-- ===== 主题切换 ===== -->
    <script>
        (function() {
            var STORAGE_KEY = 'docsify-theme';
            var btn = document.getElementById('themeToggle');

            function setTheme(theme) {
                var isDark = theme === 'dark';
                document.body.classList.toggle('dark', isDark);
                btn.textContent = isDark ? '☀️' : '🌙';
                btn.className = 'theme-toggle' + (isDark ? '' : ' light-mode');
                try { localStorage.setItem(STORAGE_KEY, theme); } catch (_) {}
            }

            function toggleTheme() {
                setTheme(document.body.classList.contains('dark') ? 'light' : 'dark');
            }

            var saved = localStorage.getItem(STORAGE_KEY);
            if (saved) {
                setTheme(saved);
            } else if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
                setTheme('dark');
            }

            btn.addEventListener('click', toggleTheme);

            try {
                window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', function(e) {
                    if (!localStorage.getItem(STORAGE_KEY)) {
                        setTheme(e.matches ? 'dark' : 'light');
                    }
                });
            } catch (_) {}
        })();
    </script>

    <!-- PWA -->
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js').catch(function() {});
        }
    </script>

    <!-- Google Analytics -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-BPRGR23JEG">
    </script>
    <script>
        window.dataLayer = window.dataLayer || [];

        function gtag() { dataLayer.push(arguments); }
        gtag('js', new Date());
        gtag('config', 'G-BPRGR23JEG');
    </script>

</body>
</html>
